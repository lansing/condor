# Frigate Remote Detector Server Configuration
# Extended options are commented out with their default values shown.

server:
  # ZMQ REP socket endpoint. Used only when num_workers: 1 (default single-worker mode).
  endpoint: "tcp://*:5555"
  # Directory where model files are stored and received from Frigate.
  models_dir: "./models"
  # Number of independent worker threads, each with its own ZMQ REP socket.
  # Each worker binds to base_port + i so Frigate can be configured with N
  # separate detector entries pointing to consecutive ports.
  num_workers: 2       # default: 1 (single-worker, uses endpoint above)
  base_port: 5555      # workers bind to base_port, base_port+1, ..., base_port+N-1

inference:
  # Inference backend.
  # Options:
  #   "onnx"      — ONNX Runtime (CPU + optional hardware EPs).
  #                 provider_options:
  #                   execution_provider: "CPUExecutionProvider"       # default
  #                   execution_provider: "OpenVINOExecutionProvider"  # needs onnxruntime-openvino
  #                   execution_provider: "CUDAExecutionProvider"      # needs onnxruntime-gpu
  #                   device: "GPU"   # EP-specific device (e.g. CPU/GPU/AUTO for OpenVINO EP)
  #
  #   "openvino"  — Native OpenVINO runtime (not onnxruntime-openvino).
  #                 Requires: uv sync --extra openvino  (or condor:openvino image).
  #                 provider_options:
  #                   device: "CPU"   # or GPU, AUTO, NPU, etc.  Default: CPU.
  #
  #   "tensorrt"  — TensorRT engine (.engine file); requires condor:tensorrt image
  #                 with --runtime nvidia.  See docs/requirements/TENSORRT.md.
  #                 provider_options:
  #                   device: 0       # CUDA device index.  Default: 0.
  provider: "tensorrt"
  #provider_options:
  #  device: 0

  # --- ONNX examples ---
  #provider: "onnx"
  #provider_options:
  #  execution_provider: "OpenVINOExecutionProvider"
  #  device: "GPU"

  # --- Native OpenVINO example ---
  #provider: "openvino"
  #provider_options:
  #  device: "AUTO"


post_process:
  # Minimum confidence score to include a detection in results.
  # confidence_threshold: 0.4
  # Maximum number of detections to return (protocol max is 20).
  # max_detections: 20

# logging:
