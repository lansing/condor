# Frigate Remote Detector Server Configuration
# Extended options are commented out with their default values shown.

server:
  # ZMQ REP socket endpoint. Used only when num_workers: 1 (default single-worker mode).
  endpoint: "tcp://*:5555"
  # Directory where model files are stored and received from Frigate.
  models_dir: "./models"
  # Number of independent worker threads, each with its own ZMQ REP socket.
  # Each worker binds to base_port + i so Frigate can be configured with N
  # separate detector entries pointing to consecutive ports.
  num_workers: 2       # default: 1 (single-worker, uses endpoint above)
  base_port: 5555      # workers bind to base_port, base_port+1, ..., base_port+N-1

inference:
  # Inference backend.
  # Options:
  #   "onnx"      — ONNX Runtime (CPU + optional hardware EPs).
  #                 provider_options:
  #                   execution_provider: "CPUExecutionProvider"       # default
  #                   execution_provider: "OpenVINOExecutionProvider"  # needs onnxruntime-openvino
  #                   execution_provider: "CUDAExecutionProvider"      # needs onnxruntime-gpu
  #                   device: "GPU"   # EP-specific device (e.g. CPU/GPU/AUTO for OpenVINO EP)
  #
  #   "openvino"  — Native OpenVINO runtime (not onnxruntime-openvino).
  #                 Requires: uv sync --extra openvino  (or condor:openvino image).
  #                 provider_options:
  #                   device: "CPU"   # or GPU, AUTO, NPU, etc.  Default: CPU.
  #
  #   "tensorrt"  — TensorRT engine (.engine file); requires condor:tensorrt image
  #                 with --runtime nvidia.  See docs/requirements/TENSORRT.md.
  #                 provider_options:
  #                   device: 0       # CUDA device index.  Default: 0.
  provider: "tensorrt"
  #provider_options:
  #  device: 0
  # Maximum number of workers that may execute the hardware inference call
  # (execute_v2 / session.run / request.infer) simultaneously.
  # 0 = unlimited (default — suitable when the GPU has enough headroom).
  # 1 = serialise inference calls; workers still pipeline H→D/D→H and
  #     post-processing concurrently, so throughput improves vs. a single worker.
  # N = allow up to N concurrent GPU kernel launches (MIG / powerful GPUs).
  max_inference_concurrency: 1

  # --- ONNX examples ---
  #provider: "onnx"
  #provider_options:
  #  execution_provider: "OpenVINOExecutionProvider"
  #  device: "GPU"

  # --- Native OpenVINO example ---
  #provider: "openvino"
  #provider_options:
  #  device: "AUTO"


post_process:
  # Minimum confidence score to include a detection in results.
  # confidence_threshold: 0.4
  # Maximum number of detections to return (protocol max is 20).
  # max_detections: 20

# logging:
#   level: "INFO"  # Options: DEBUG, INFO, WARNING, ERROR, CRITICAL

# ── Observability (OpenTelemetry traces + metrics) ──────────────────────────
# Set enabled: true to activate.  mode controls where data goes:
#
#   "console"    — spans (optional) + metric snapshot to stdout every N seconds.
#                  Zero extra software needed.
#
#   "prometheus" — Prometheus scrape endpoint at http://0.0.0.0:9090/metrics.
#                  Requires: make install-observability-local
#                  No database needed; just curl localhost:9090/metrics.
#
#   "otlp"       — Export traces + metrics via OTLP to HyperDX, Grafana, etc.
#                  Requires: make install-observability-otlp
#                  Self-hosted HyperDX: docker run -p 8080:8080 -p 4318:4318 hyperdx/hyperdx-local
#
observability:
  enabled: true
  mode: "console"           # console | prometheus | otlp
  service_name: "condor"
  service_version: "0.1.0"
#
#   # Console mode settings:
  console:
    metrics_interval_seconds: 30   # Print metric snapshot every N seconds
#     export_traces: false           # Also print individual spans as JSON (verbose)
#
#   # Prometheus mode settings:
#   prometheus:
#     host: "0.0.0.0"
#     port: 9090
#
#   # OTLP mode settings (HyperDX self-hosted or cloud):
#   otlp:
#     endpoint: "http://localhost:4318"    # HyperDX local; change to cloud URL
#     headers: {}                          # {"authorization": "Bearer KEY"} for cloud
#     export_traces: true
#     export_metrics: true
#     metrics_interval_seconds: 30
